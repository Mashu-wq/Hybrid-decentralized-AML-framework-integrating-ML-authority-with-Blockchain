version: "3.9"

# =============================================================================
# FRAUD DETECTION SYSTEM — Full Local Development Environment
# =============================================================================
# Usage:
#   docker compose up -d              # start all infrastructure
#   docker compose up -d postgres     # start only PostgreSQL
#   docker compose logs -f kafka      # tail Kafka logs
#   docker compose down -v            # stop and remove volumes
#
# Ports summary:
#   PostgreSQL  : 5432
#   MongoDB     : 27017
#   Redis       : 6379
#   Kafka       : 9092 (broker), 9093 (JMX)
#   Zookeeper   : 2181
#   Vault       : 8200
#   Jaeger UI   : 16686, collector: 14268, gRPC: 14250
#   Prometheus  : 9090
#   Grafana     : 3000
#   MLflow      : 5000
# =============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

networks:
  fraud-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  vault_data:
  prometheus_data:
  grafana_data:
  mlflow_data:
  elasticsearch_data:

services:
  # ===========================================================================
  # PostgreSQL 15 — Primary relational store (KYC, IAM, Alerts, Cases)
  # ===========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: fds-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fraud_detection}
      POSTGRES_USER: ${POSTGRES_USER:-fraud_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_strong_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    networks:
      fraud-net:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fraud_user} -d ${POSTGRES_DB:-fraud_detection}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  # ===========================================================================
  # MongoDB 6 — Time-series transaction store
  # ===========================================================================
  mongodb:
    image: mongo:6.0
    container_name: fds-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mongo_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme_strong_password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-fraud_detection}
    volumes:
      - mongo_data:/data/db
      - ./scripts/db/mongo-init.js:/docker-entrypoint-initdb.d/01-init.js:ro
    ports:
      - "27017:27017"
    networks:
      fraud-net:
        ipv4_address: 172.20.0.11
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

  # ===========================================================================
  # Redis 7 — Caching, sessions, pub/sub, bloom filters, rate limiting
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: fds-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme_redis_password}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --hz 20
      --loglevel notice
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      fraud-net:
        ipv4_address: 172.20.0.12
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis_password}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging

  # ===========================================================================
  # Zookeeper — Required by Kafka
  # ===========================================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: fds-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=mntr,conf,ruok"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    ports:
      - "2181:2181"
    networks:
      fraud-net:
        ipv4_address: 172.20.0.13
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ===========================================================================
  # Apache Kafka 3.x — Event streaming backbone
  # ===========================================================================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: fds-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168   # 7 days
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9092:9092"
      - "9101:9101"
    networks:
      fraud-net:
        ipv4_address: 172.20.0.14
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    logging: *default-logging

  # ===========================================================================
  # Kafka UI — Topic and consumer group management (dev only)
  # ===========================================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fds-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: fraud-detection-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      SERVER_PORT: 8090
    ports:
      - "8090:8090"
    networks:
      fraud-net:
        ipv4_address: 172.20.0.15
    profiles:
      - dev-tools
    logging: *default-logging

  # ===========================================================================
  # Kafka Topic Initializer — Creates required topics on startup
  # ===========================================================================
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: fds-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - fraud-net
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Waiting for Kafka to be ready...'
      kafka-topics --bootstrap-server kafka:29092 --list
      echo 'Creating Kafka topics...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic kyc.events --replication-factor 1 --partitions 6
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic transactions.raw --replication-factor 1 --partitions 12
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic alerts.created --replication-factor 1 --partitions 6
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic audit.events --replication-factor 1 --partitions 3
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic blockchain.events --replication-factor 1 --partitions 3
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic notifications.outbound --replication-factor 1 --partitions 6
      echo 'All Kafka topics created successfully.'
      kafka-topics --bootstrap-server kafka:29092 --list
      "
    logging: *default-logging

  # ===========================================================================
  # HashiCorp Vault — Secrets management & PII encryption (Transit engine)
  # ===========================================================================
  vault:
    image: hashicorp/vault:1.16
    container_name: fds-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_LOG_LEVEL: info
    volumes:
      - vault_data:/vault/data
      - ./scripts/vault/vault-init.sh:/vault/init.sh:ro
    ports:
      - "8200:8200"
    networks:
      fraud-net:
        ipv4_address: 172.20.0.20
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging: *default-logging

  # ===========================================================================
  # Vault Initializer — Configures Transit engine and keys
  # ===========================================================================
  vault-init:
    image: hashicorp/vault:1.16
    container_name: fds-vault-init
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - fraud-net
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-dev-root-token}
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Configuring HashiCorp Vault...'
      sleep 2
      vault secrets enable -path=transit transit || echo 'Transit already enabled'
      vault write -f transit/keys/fraud-pii-key type=aes256-gcm96
      vault write transit/keys/fraud-pii-key/config min_decryption_version=1 deletion_allowed=false
      vault secrets enable -path=secret kv-v2 || echo 'KV already enabled'
      echo 'Vault configuration complete.'
      "
    logging: *default-logging

  # ===========================================================================
  # Jaeger — Distributed tracing (OpenTelemetry compatible)
  # ===========================================================================
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: fds-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: memory
      QUERY_MAX_CLOCK_SKEW_ADJUSTMENT: 1s
    ports:
      - "5775:5775/udp"    # Zipkin thrift compact
      - "6831:6831/udp"    # Jaeger thrift compact
      - "6832:6832/udp"    # Jaeger thrift binary
      - "5778:5778"        # Jaeger agent config server
      - "16686:16686"      # Jaeger UI
      - "14268:14268"      # HTTP collector
      - "14250:14250"      # gRPC collector
      - "9411:9411"        # Zipkin collector
      - "4317:4317"        # OTLP gRPC
      - "4318:4318"        # OTLP HTTP
    networks:
      fraud-net:
        ipv4_address: 172.20.0.30
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:16686/"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ===========================================================================
  # Prometheus — Metrics collection
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: fds-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - prometheus_data:/prometheus
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/monitoring/prometheus/rules:/etc/prometheus/rules:ro
    ports:
      - "9090:9090"
    networks:
      fraud-net:
        ipv4_address: 172.20.0.31
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ===========================================================================
  # Grafana — Dashboards and alerting
  # ===========================================================================
  grafana:
    image: grafana/grafana:10.4.2
    container_name: fds-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme_grafana_password}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: localhost
      GF_SMTP_ENABLED: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      fraud-net:
        ipv4_address: 172.20.0.32
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ===========================================================================
  # MLflow — Model registry and experiment tracking
  # ===========================================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: fds-mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER:-fraud_user}:${POSTGRES_PASSWORD:-changeme_strong_password}@postgres:5432/${POSTGRES_DB:-fraud_detection}
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
      MLFLOW_HOST: 0.0.0.0
      MLFLOW_PORT: 5000
    volumes:
      - mlflow_data:/mlflow/artifacts
    ports:
      - "5000:5000"
    networks:
      fraud-net:
        ipv4_address: 172.20.0.40
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER:-fraud_user}:${POSTGRES_PASSWORD:-changeme_strong_password}@postgres:5432/${POSTGRES_DB:-fraud_detection}
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
      --serve-artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *default-logging

  # ===========================================================================
  # Elasticsearch — Log aggregation (ELK stack)
  # ===========================================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: fds-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      bootstrap.memory_lock: "true"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      fraud-net:
        ipv4_address: 172.20.0.50
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    profiles:
      - elk
    logging: *default-logging

  # ===========================================================================
  # Kibana — Log visualization (ELK stack)
  # ===========================================================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: fds-kibana
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
      XPACK_SECURITY_ENABLED: "false"
    ports:
      - "5601:5601"
    networks:
      fraud-net:
        ipv4_address: 172.20.0.51
    profiles:
      - elk
    logging: *default-logging

  # ===========================================================================
  # API Gateway — single ingress point for all external traffic
  # ===========================================================================
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: fds-api-gateway
    restart: unless-stopped
    env_file: .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_GATEWAY_PORT: ${API_GATEWAY_PORT:-8080}
      IAM_SERVICE_HOST: iam-service
      IAM_SERVICE_PORT: ${IAM_SERVICE_PORT:-9000}
      IAM_SERVICE_GRPC_PORT: ${IAM_SERVICE_GRPC_PORT:-50060}
      KYC_SERVICE_HOST: kyc-service
      KYC_SERVICE_PORT: ${KYC_SERVICE_PORT:-9001}
      TX_SERVICE_HOST: transaction-service
      TX_SERVICE_PORT: ${TX_SERVICE_PORT:-9002}
      ALERT_SERVICE_HOST: alert-service
      ALERT_SERVICE_PORT: ${ALERT_SERVICE_PORT:-9003}
      CASE_SERVICE_HOST: case-service
      CASE_SERVICE_PORT: ${CASE_SERVICE_PORT:-9004}
      ANALYTICS_SERVICE_HOST: analytics-service
      ANALYTICS_SERVICE_PORT: ${ANALYTICS_SERVICE_PORT:-9006}
      BLOCKCHAIN_SERVICE_HOST: blockchain-service
      BLOCKCHAIN_SERVICE_PORT: ${BLOCKCHAIN_SERVICE_PORT:-9005}
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      RATE_LIMIT_PUBLIC_RPM: ${RATE_LIMIT_PUBLIC_RPM:-100}
      RATE_LIMIT_SERVICE_RPM: ${RATE_LIMIT_SERVICE_RPM:-1000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    networks:
      fraud-net:
        ipv4_address: 172.20.0.5
    depends_on:
      - jaeger
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ===========================================================================
  # pgAdmin — PostgreSQL management UI (dev only)
  # ===========================================================================
  pgadmin:
    image: dpage/pgadmin4:8.6
    container_name: fds-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fraud.local
      PGADMIN_DEFAULT_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme_grafana_password}
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    networks:
      - fraud-net
    profiles:
      - dev-tools
    logging: *default-logging
