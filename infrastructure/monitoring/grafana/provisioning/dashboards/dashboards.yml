apiVersion: 1

providers:
  - name: 'fraud-detection-dashboards'
    orgId: 1
    folder: 'Fraud Detection'
    folderUid: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
