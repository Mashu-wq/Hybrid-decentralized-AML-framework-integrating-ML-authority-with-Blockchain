name: fraud-detection-network-org1
version: 1.0.0
client:
  organization: Org1
  connection:
    timeout:
      peer:
        endorser: 300
        eventHub: 300
        eventReg: 300
      orderer: 300
organizations:
  Org1:
    mspid: Org1MSP
    cryptoPath: ../crypto-config/peerOrganizations/org1.fraud-detection.example.com/users/{username}@org1.fraud-detection.example.com/msp
    peers:
      - peer0.org1.fraud-detection.example.com
      - peer1.org1.fraud-detection.example.com
    certificateAuthorities: []
  Org2:
    mspid: Org2MSP
    peers:
      - peer0.org2.fraud-detection.example.com
      - peer1.org2.fraud-detection.example.com
  Org3:
    mspid: Org3MSP
    peers:
      - peer0.org3.fraud-detection.example.com
      - peer1.org3.fraud-detection.example.com
orderers:
  orderer0.fraud-detection.example.com:
    url: grpcs://localhost:7050
    grpcOptions:
      ssl-target-name-override: orderer0.fraud-detection.example.com
      hostnameOverride: orderer0.fraud-detection.example.com
    tlsCACerts:
      path: ../crypto-config/ordererOrganizations/fraud-detection.example.com/orderers/orderer0.fraud-detection.example.com/tls/ca.crt
  orderer1.fraud-detection.example.com:
    url: grpcs://localhost:8050
    grpcOptions:
      ssl-target-name-override: orderer1.fraud-detection.example.com
      hostnameOverride: orderer1.fraud-detection.example.com
    tlsCACerts:
      path: ../crypto-config/ordererOrganizations/fraud-detection.example.com/orderers/orderer1.fraud-detection.example.com/tls/ca.crt
  orderer2.fraud-detection.example.com:
    url: grpcs://localhost:9050
    grpcOptions:
      ssl-target-name-override: orderer2.fraud-detection.example.com
      hostnameOverride: orderer2.fraud-detection.example.com
    tlsCACerts:
      path: ../crypto-config/ordererOrganizations/fraud-detection.example.com/orderers/orderer2.fraud-detection.example.com/tls/ca.crt
peers:
  peer0.org1.fraud-detection.example.com:
    url: grpcs://localhost:7051
    tlsCACerts:
      path: ../crypto-config/peerOrganizations/org1.fraud-detection.example.com/peers/peer0.org1.fraud-detection.example.com/tls/ca.crt
    grpcOptions:
      ssl-target-name-override: peer0.org1.fraud-detection.example.com
      hostnameOverride: peer0.org1.fraud-detection.example.com
  peer1.org1.fraud-detection.example.com:
    url: grpcs://localhost:8051
    tlsCACerts:
      path: ../crypto-config/peerOrganizations/org1.fraud-detection.example.com/peers/peer1.org1.fraud-detection.example.com/tls/ca.crt
    grpcOptions:
      ssl-target-name-override: peer1.org1.fraud-detection.example.com
      hostnameOverride: peer1.org1.fraud-detection.example.com
  peer0.org2.fraud-detection.example.com:
    url: grpcs://localhost:9051
    tlsCACerts:
      path: ../crypto-config/peerOrganizations/org2.fraud-detection.example.com/peers/peer0.org2.fraud-detection.example.com/tls/ca.crt
    grpcOptions:
      ssl-target-name-override: peer0.org2.fraud-detection.example.com
