services:
  # ===============================
  # IAM SERVICE
  # ===============================
  iam:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iam-service
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    networks:
      - iam-network
    restart: unless-stopped

  # ===============================
  # POSTGRESQL
  # ===============================
  postgres:
    image: postgres:15-alpine
    container_name: iam-postgres
    environment:
      POSTGRES_DB: kyc_aml_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgresql
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iam-network

  # ===============================
  # REDIS
  # ===============================
  redis:
    image: redis:7-alpine
    container_name: iam-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iam-network

  # ===============================
  # ELASTICSEARCH (AUDIT LOGS)
  # ===============================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: iam-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9201:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - iam-network

  # ===============================
  # KIBANA (ELASTIC UI)
  # ===============================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.9.2
    container_name: iam-kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - iam-network

  # ===============================
  # PGADMIN (OPTIONAL)
  # ===============================
  pgadmin:
    image: dpage/pgadmin4
    container_name: iam-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@iam-service.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5051:80"
    depends_on:
      - postgres
    networks:
      - iam-network

  # ===============================
  # REDIS COMMANDER (OPTIONAL)
  # ===============================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: iam-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8082:8081"
    depends_on:
      - redis
    networks:
      - iam-network

# ===============================
# VOLUMES
# ===============================
volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:

# ===============================
# NETWORK
# ===============================
networks:
  iam-network:
    driver: bridge
