global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    environment: 'development'
    project: 'fraud-detection-system'

rule_files:
  - 'rules/*.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # configure alertmanager in production

scrape_configs:
  # --- Prometheus itself ---
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # --- API Gateway ---
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: '/metrics'

  # --- Go Microservices ---
  - job_name: 'iam-service'
    static_configs:
      - targets: ['host.docker.internal:9000']
    metrics_path: '/metrics'

  - job_name: 'kyc-service'
    static_configs:
      - targets: ['host.docker.internal:9001']
    metrics_path: '/metrics'

  - job_name: 'transaction-service'
    static_configs:
      - targets: ['host.docker.internal:9002']
    metrics_path: '/metrics'

  - job_name: 'alert-service'
    static_configs:
      - targets: ['host.docker.internal:9003']
    metrics_path: '/metrics'

  - job_name: 'case-service'
    static_configs:
      - targets: ['host.docker.internal:9004']
    metrics_path: '/metrics'

  - job_name: 'blockchain-service'
    static_configs:
      - targets: ['host.docker.internal:9005']
    metrics_path: '/metrics'

  - job_name: 'analytics-service'
    static_configs:
      - targets: ['host.docker.internal:9006']
    metrics_path: '/metrics'

  - job_name: 'encryption-service'
    static_configs:
      - targets: ['host.docker.internal:9007']
    metrics_path: '/metrics'

  # --- ML Service (Python/FastAPI) ---
  - job_name: 'ml-service'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: '/metrics'

  # --- PostgreSQL ---
  - job_name: 'postgres'
    static_configs:
      - targets: ['host.docker.internal:9187']  # postgres_exporter

  # --- Redis ---
  - job_name: 'redis'
    static_configs:
      - targets: ['host.docker.internal:9121']  # redis_exporter

  # --- Kafka ---
  - job_name: 'kafka'
    static_configs:
      - targets: ['host.docker.internal:9308']  # kafka_exporter

  # --- Jaeger ---
  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']
    metrics_path: '/metrics'
