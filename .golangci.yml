# =============================================================================
# golangci-lint configuration — Strict mode
# Run: golangci-lint run ./...
# =============================================================================

run:
  timeout: 5m
  go: "1.22"
  tests: true

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true
    disable:
      - fieldalignment   # too noisy, not critical for this project

  gocyclo:
    min-complexity: 15

  dupl:
    threshold: 150

  goconst:
    min-len: 3
    min-occurrences: 3

  misspell:
    locale: US

  lll:
    line-length: 120

  goimports:
    local-prefixes: github.com/fraud-detection

  revive:
    rules:
      - name: exported
      - name: var-naming
      - name: unexported-return
      - name: unused-parameter
      - name: unused-receiver

  gosec:
    severity: medium
    confidence: medium
    excludes:
      - G104  # errors unhandled — handled by errcheck
      - G304  # file inclusion (needed for config loading)

  godot:
    scope: declarations
    capital: false

  exhaustive:
    default-signifies-exhaustive: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - bodyclose
    - contextcheck
    - dupl
    - durationcheck
    - errorlint
    - exhaustive
    - forcetypeassert
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - gofmt
    - goimports
    - gomnd
    - gosec
    - lll
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - revive
    - rowserrcheck
    - sqlclosecheck
    - stylecheck
    - thelper
    - unconvert
    - unparam
    - whitespace
    - wrapcheck

  disable:
    - deadcode      # deprecated
    - exhaustruct   # too strict for this project
    - funlen        # managed by gocognit/gocyclo
    - godox         # TODO comments are expected in thesis project
    - varcheck      # deprecated
    - structcheck   # deprecated

issues:
  exclude-rules:
    # Test files get more relaxed rules
    - path: "_test\\.go"
      linters:
        - gomnd
        - dupl
        - gochecknoinits
        - goconst
        - wrapcheck
        - forcetypeassert

    # Chaincode files — Hyperledger shim has different conventions
    - path: "blockchain/chaincode/"
      linters:
        - gochecknoinits
        - wrapcheck

    # Generated proto files
    - path: "proto/gen/"
      linters:
        - all

    # Migration files
    - path: "migrations/"
      linters:
        - gomnd
        - dupl

  max-issues-per-linter: 50
  max-same-issues: 10
